dataset:
  eval_batch_size: 32
  eval_chunk_size: 64   # YOLO predict 청크 크기 (대량 test set OOM 방지)
  image_size: 512
  num_workers: 4
  pruning_threshold: 0.6
  
  # 도메인별 증강 비율 (domain → {full, pruned})
  # Classification(ISP)은 적게, Segmentation(MVTec/VisA)은 더 많이
  augmentation_ratio_by_domain:
    isp:
      full: 1.0      # ISP: 1:1 균형 (classification task)
      pruned: 0.5    # pruned는 더 보수적
    mvtec:
      full: 2.0      # MVTec: 2:1 (segmentation, 더 많은 데이터 필요)
      pruned: 1.5
    visa:
      full: 2.0      # VisA: 2:1 (segmentation)
      pruned: 1.5
  
  # Fallback 기본값 (도메인 매칭 실패 시 또는 override 용도)
  augmentation_ratio_full: null      # null=모두 사용
  augmentation_ratio_pruned: null    # null=모두 사용
  
  task_by_domain:
    isp: classification
    mvtec: segmentation
    visa: segmentation
  train_batch_size: 16

dataset_groups:
  baseline:
    description: 원본 train/good 만 (pretrained 특징 거리)
  aroma_full:
    description: 원본 + 전체 Stage 4 합성
  aroma_pruned:
    description: 원본 + quality_score 필터링 합성

evaluation:
  metrics:
    - image_auroc
    - image_f1
    - pixel_auroc
  pixel_auroc_domains:
    - mvtec
    - visa

# dataset_config.json 카테고리 구성:
#   ISP(3)   : ASM, LSM_1, LSM_2
#   MVTec(15): 전 카테고리
#   VisA(8)  : candle, capsules, cashew, chewinggum, fryum, macaroni, pcb, pipe_fryum
#     - macaroni: macaroni1 경로 사용 (macaroni2 config에서 제거)
#     - pcb    : pcb1 경로 사용 (pcb2-4 config에서 제거)
# benchmark 실험 규모: 2 models × 3 groups × 24 categories = 144 runs
#   (LSM_2는 LSM_1과 동일 센서·라인이므로 benchmark에서 제외)
category_filter:
  exclude:
    isp:
      - LSM_2        # LSM_1 과 동일 라인스캔 센서, 샘플만 다름
    mvtec: []        # 전 카테고리 고유 제품 — 제외 없음
    visa: []         # macaroni2/pcb2-4 는 dataset_config 에서 완전 제거됨

experiment:
  name: aroma_benchmark_v1
  output_dir: outputs/benchmark_results   # 실험 아티팩트 (로컬 가능)
  # results_dir: /content/drive/MyDrive/data/Aroma/benchmark_results  # Google Drive 경로 설정 시 활성화
  seed: 42

models:
  yolo11:
    model: yolo11n-cls.pt          # ultralytics YOLO11 nano (classification)
    epochs: 30
    lr: 0.01                       # ultralytics default SGD lr
    pretrained: true

  efficientdet_d0:
    backbone: efficientdet_d0      # effdet EfficientDet-D0 (EfficientNet-B0 backbone)
    epochs: 30
    lr: 0.0001
    optimizer: adam
    pretrained: true
